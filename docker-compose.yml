# Docker Compose file for NyayaSetu DBT System
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nyayasetu
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nyayasetu_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nyayasetu_network

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://nyayasetu:password@postgres:5432/nyayasetu_db
      - BACKEND_CORS_ORIGINS=["http://localhost:3000"]
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=nyayasetu
      - POSTGRES_DB=nyayasetu_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
    networks:
      - nyayasetu_network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyayasetu_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - nyayasetu_network
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:

networks:
  nyayasetu_network:
    driver: bridge